@let items = collection();
@let initialSelectedId = selectedId();
@let loading = isLoading();

<div class="wrapper" clickOutside (onClickOutside)="onClickOutside()">
    @if(loading) {
        <x-groups-loading-indicator />
    }

    <x-virtual-list #list class="list" [items]="items" [itemRenderer]="itemRenderer" [itemSize]="38" methodForSelecting="select"
        [selectByClick]="false" [dynamicSize]="true" [bufferSize]="0" [maxBufferSize]="0" [selectedIds]="initialSelectedId"
        [scrollStartOffset]="scrollStartOffset()" scrollbarPreset="x-scrollbar-primary"></x-virtual-list>

    <ng-template #itemRenderer let-data="data" let-config="config">
        @if (data) {
            @switch (data.type) {
                @case ("group") {
                    <div class="list__item-container" (click)="config.select(true); onGroupClickHandler(data)">
                        <div class="content">
                            <p localeSensitive class="name">{{data.text}}</p>
                        </div>
                    </div>
                }
                @default {
                    @let class = {'selected': config.selected};
                    <div localeSensitive class="list__item-container" [ngClass]="class" (click)="config.select(true); onGroupClickHandler(data)">
                        <div class="group">
                        <span>
                            <svg fill="#b8b8b8" width="40px" height="40px" viewBox="0 0 512 512">
                            <path
                                d="M256,48C141.31,48,48,141.31,48,256s93.31,208,208,208,208-93.31,208-208S370.69,48,256,48ZM205.78,164.82C218.45,151.39,236.28,144,256,144s37.39,7.44,50.11,20.94C319,178.62,325.27,197,323.79,216.76,320.83,256,290.43,288,256,288s-64.89-32-67.79-71.25C186.74,196.83,193,178.39,205.78,164.82ZM256,432a175.49,175.49,0,0,1-126-53.22,122.91,122.91,0,0,1,35.14-33.44C190.63,329,222.89,320,256,320s65.37,9,90.83,25.34A122.87,122.87,0,0,1,382,378.78,175.45,175.45,0,0,1,256,432Z" />
                            </svg>
                        </span>
                        <p class="name">{{data.text}}</p>
                        </div>
                    </div>
                }
            }
        }
    </ng-template>
</div>
