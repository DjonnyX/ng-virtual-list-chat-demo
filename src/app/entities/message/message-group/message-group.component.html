@let class = classes();
@let value = text();
@let isCollapsed = collapsed();

<div class="group-container"
    [ngClass]="class">
    <span class="name">
        <span>{{value}}</span>
        <span class="collapsable-indicator">
            @if (isCollapsed) {
                <svg width="10" height="10" fill="inherit" viewBox="0 0 24 24">
                    <path fill="inherit"
                        d="M12.601 17.596a.85.85 0 0 1-1.202 0L1.239 7.436a.75.75 0 0 1 1.06-1.061l9.701 9.7 9.7-9.7a.75.75 0 0 1 1.061 1.06z">
                    </path>
                </svg>
            } @else {
                <svg width="10" height="10" fill="inherit" viewBox="0 0 24 24">
                    <path fill="inherit"
                        d="M12.601 6.404a.85.85 0 0 0-1.202 0l-10.16 10.16a.75.75 0 0 0 1.06 1.061L12 7.925l9.7 9.7a.75.75 0 0 0 1.061-1.06z">
                    </path>
                </svg>
            }
        </span>
    </span>
</div>
