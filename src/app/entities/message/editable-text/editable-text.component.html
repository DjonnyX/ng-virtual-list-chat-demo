@let isEditing = editing();
@let value = text();
@let formattedValue = formattedText();
@let substringClass = searchSubstringClass();
@let searchedWords = searchPattern();
@if (isEditing) {
    <textarea #textarea cdkTextareaAutosize name="editable-text" class="editor-editable" [value]="value"
        (keydown)="onKeyDownHandler($event)" (click)="onTextAreaClickHandler($event)" (input)="onInputHandler($event)"></textarea>
} @else {
    <span #readonlyText [style.--link-normal-color]="linkNormalColor()" [style.--link-visited-color]="linkVisitedColor()"
        [ngStyle]="readonlyStyles()" [style.--link-hover-color]="linkHoverColor()"
        [style.--link-active-color]="linkActiveColor()" [style.--search-substring-background]="searchSubstringBackground()"
        searchHighlight class="editor-readonly" [substringClass]="substringClass" [text]="formattedValue"
        [searchedWords]="searchedWords" (click)="onTextClickHandler($event)"></span>
}
