<div aria-live="polite" aria-atomic="true" class="xvl__screen-reader">
  {{ screenReaderFormattedMessage() }}
</div>

@if (snap()) {
  <div #snapped part="snapped-item" class="xvl__list-snapper">
    <ng-container #snapRendererContainer></ng-container>
  </div>
}
<x-scroller #scroller [focusedElement]="focusedElement()">
  <ng-container #renderersContainer></ng-container>
</x-scroller>
