@let w = thumbWidth();
@let h = thumbHeight();
@let t = type();
@let r = roundCorner();
<div class="track" [ngStyle]="styles()">
    <div #thumb class="thumb">
        <x-substrate mode="rounded-rectangle" class="shape" [type]="t" [width]="w" [height]="h" [roundCorner]="r"
            [strokeWidth]="8" [fillColorPositions]="thumbGradientPositions()" [fillColors]="thumbGradientFill()"
            [strokeColors]="strokeGradientColor()" [strokeAnimationDuration]="strokeAnimationDuration()"></x-substrate>
    </div>
</div>
