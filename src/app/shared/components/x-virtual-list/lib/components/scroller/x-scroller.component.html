<div localeSensitive class="xvl__container" [ngClass]="containerClasses()">
    <div #scrollViewport cdkScrollable part="scroller" class="xvl__scroller">
        <div #scrollContent [attr.aria-orientation]="direction()" [attr.aria-activedescendant]="focusedElement()"
            tabindex="0" part="list" class="xvl__list" [ngClass]="actualClasses()">
            <ng-content>
                {{content()}}
            </ng-content>
        </div>
    </div>
    <x-scroll-bar [isVertical]="isVertical()" [size]="thumbSize()" [preset]="scrollbarPreset()" [position]="thumbPosition()"
        [thumbGradientPositions]="thumbGradientPositions()" [loading]="loading()" [prepared]="preparedSignal()"
        (onDrag)="onScrollBarDragHandler($event)"></x-scroll-bar>
</div>
