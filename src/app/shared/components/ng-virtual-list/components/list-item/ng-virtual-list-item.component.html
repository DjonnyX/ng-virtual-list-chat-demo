@let renderer = itemRenderer();
<div itemClick [maxClickDistance]="maxClickDistance()" [part]="part()" [attr.ngvl-index]="index()" tabindex="0"
    class="ngvl-item__container" [ngClass]="classes()" (onClick)="onClickHandler()">
    @if (renderer) {
        <ng-container [ngTemplateOutlet]="renderer" [ngTemplateOutletContext]="templateContext()" />
    }
</div>
