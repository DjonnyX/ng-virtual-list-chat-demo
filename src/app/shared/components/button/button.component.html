@let m = mode();
@let t = type();
@let b = bounds();
@let value = content();
@let stroke = strokeColor();
@let corner = roundCorner();
@let gradientFillColors = fillColors();
@let gradientFillPositions = fillPositions();
<button class="button" (click)="onClickHandler($event)">
    <button-substrate class="substrate" [fillColors]="gradientFillColors" [fillColorPositions]="gradientFillPositions" 
        [width]="b.width" [height]="b.height" [roundCorner]="corner" [mode]="m" [type]="t" [strokeColors]="stroke" />
    <span class="content">
        <ng-content>
            {{value}}
        </ng-content>
    </span>
</button>
