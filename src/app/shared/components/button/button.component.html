@let m = mode();
@let t = type();
@let b = bounds();
@let value = content();
@let stroke = strokeColor();
@let corner = roundCorner();

<button class="button">
    <button-substrate class="substrate" [width]="b.width" [height]="b.height" [roundCorner]="corner" [mode]="m"
        [type]="t" [strokeColors]="stroke" />
    <span class="content">
        <ng-content>
            {{value}}
        </ng-content>
    </span>
</button>
